name: Native Build Reusable

on:
  workflow_call:
    inputs:
      artifact-retention-days:
        description: Artifact retention in days
        required: false
        type: number
        default: 7

permissions: {}

jobs:
  native:
    name: Build native (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            jreleaser-platform: linux-x86_64
            binary: csi-codesign
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            jreleaser-platform: linux-aarch_64
            binary: csi-codesign
          - os: macos-latest
            platform: macos-aarch64
            jreleaser-platform: osx-aarch_64
            binary: csi-codesign
          - os: windows-latest
            platform: windows-x86_64
            jreleaser-platform: windows-x86_64
            binary: csi-codesign.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # rc
        with:
          disable-sudo-and-containers: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            release-assets.githubusercontent.com:443
            repo.maven.apache.org:443

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@8c5543b71f44568342e106336639979e94a8f6de # v1.6.1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Build native binary
        shell: bash
        run: ./mvnw -B -ntp -Pnative -pl cli --also-make -DskipTests package

      - name: Upload native binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: csi-codesign-${{ matrix.jreleaser-platform }}
          path: cli/target/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}
