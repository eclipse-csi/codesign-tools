name: Native Build Reusable

on:
  workflow_call:
    inputs:
      artifact-retention-days:
        description: Artifact retention in days
        required: false
        type: number
        default: 7

permissions: {}

jobs:
  native:
    name: Build native (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            jreleaser-platform: linux-x86_64
            binary: csi-codesign
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            jreleaser-platform: linux-aarch_64
            binary: csi-codesign
          - os: macos-latest
            platform: macos-aarch64
            jreleaser-platform: osx-aarch_64
            binary: csi-codesign
          - os: windows-latest
            platform: windows-x86_64
            jreleaser-platform: windows-x86_64
            binary: csi-codesign.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo-and-containers: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            release-assets.githubusercontent.com:443
            repo.maven.apache.org:443

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@60c26726de13f8b90771df4bc1641a52a3159994 # v1.5.2
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Build native binary
        shell: bash
        run: ./mvnw -B -ntp -Pnative -pl cli --also-make -DskipTests package

      - name: Upload native binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: csi-codesign-${{ matrix.jreleaser-platform }}
          path: cli/target/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}
